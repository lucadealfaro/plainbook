<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="data:image/x-icon;base64,AAABAAEAAQEAAAEAIAAwAAAAFgAAACgAAAABAAAAAgAAAAEAIAAAAAAABAAAAAAAAAAAAAAAAAAAAAAAAAAAAPAAAAAA=="/>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/font-awesome.css">
    <style>
      /* Ensure content isn’t hidden behind the fixed navbar */
      body.has-navbar-fixed-top { padding-top: 3.25rem; }      
      /* Make the notebook section scrollable and prevent overlap with navbar */
      .section {
        height: calc(100vh - 3.25rem);
        overflow-y: auto;
        overflow-x: hidden;
      }
      
      /* Add scroll margin to cells so they don't hide under the navbar when scrolling */
      .notebook-cell {
        scroll-margin-top: 1rem;
      }    </style>
  </head>
  <body class="has-navbar-fixed-top">

    <div id="app"></div>
    
    <script type="text/x-template" id="app-template">
    <nav class="navbar is-dark is-fixed-top" role="navigation" aria-label="main navigation">
        <div id="the-navbar-menu" class="navbar-menu">
            <div class="navbar-start">
                <div class="navbar-item">
                    <div class="buttons">
                        <button v-if="!running && notebook && lastRunIndex < notebook.cells.length - 1"
                            @click="runAllCells"
                            class="button is-primary">
                            <span class="icon"><i class="fa fa-play"></i></span>
                            <span>Run All</span>
                        </button>
                        <button v-else-if="!running && notebook && lastRunIndex >= notebook.cells.length - 1"
                                disabled
                                class="button is-primary">
                            <span class="icon"><i class="fa fa-check"></i></span>
                            <span>Up to Date</span>
                        </button>
                        <button v-else-if="running"
                                @click="interruptKernel"
                                class="button is-danger">
                            <span class="icon"><i class="fa fa-stop"></i></span>
                            <span>Running...</span>
                        </button>
                        <button v-if="!running && notebook"
                            @click="reloadNotebook"
                            class="button is-warning">
                            <span class="icon"><i class="fa fa-refresh"></i></span>
                            <span>Refresh</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="navbar-end">
                <div class="navbar-item">
                    <div class="buttons">
                        <button id="btn-settings" class="button is-info" @click="openSettings">
                            <span class="icon"><i :class="geminiApiKey ? 'fa fa-cog' : 'fa fa-warning'"></i></span>
                            <span>Settings</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="section">
        <h1 class="title">{{ notebook_name }}</h1>
        <div class="notebook-container px-2 py-2">
            <div v-if="loading" class="has-text-centered py-6">
                <button class="button is-loading is-ghost is-large">Loading</button>
                <p class="has-text-grey">Fetching notebook data...</p>
            </div>
            <div v-else-if="error" class="notification is-danger is-light">
                <button class="delete" @click="error = null"></button>
                <strong>Error:</strong> {{ error }}
            </div>
            <div v-else="notebook">
                <div v-if="notebook.cells.length === 0" class="py-1" style="display:flex; justify-content:center; gap:0.5rem;">
                    <button class="button insert-cell is-success is-small py-0 px-3" @click.stop="insertCell(0, 'markdown')">Insert Comment</button>
                    <button class="button insert-cell is-success is-small py-0 px-3" @click.stop="insertCell(0, 'code')">Insert Action</button>
                </div>
                <div v-for="(cell, index) in notebook.cells" :key="index">
                    <div v-if="activeIndex === index" class="py-1" style="display:flex; justify-content:center; gap:0.5rem;">
                        <button class="button insert-cell is-success is-small py-0 px-3" @click.stop="insertCell(index, 'markdown')">Insert Comment</button>
                        <button class="button insert-cell is-success is-small py-0 px-3" @click.stop="insertCell(index, 'code')">Insert Action</button>
                    </div>

                    <div class="notebook-cell box p-0 mb-2 is-clipped shadow-sm"
                         @click="setActiveCell(index)"
                         :style="{
                            border: activeIndex === index ? '2px solid #1d4ed8' : '1px solid transparent',
                            cursor: 'pointer'
                         }">
                        <markdown-cell v-if="cell.cell_type === 'markdown'" :source="cell.source"
                                       :is-active="activeIndex === index"
                                       :start-edit-key="markdownEditKey[index]"
                                       @save="(content) => sendMarkdownToServer(content, index)"
                                       :index="index"
                                       @delete="deleteCell(index)"
                                       @moveUp="moveCell(index, -1)"
                                       @moveDown="moveCell(index, 1)" />

                        <div v-if="cell.cell_type === 'code'">
                            <div v-if="cell.metadata?.explanation" class="has-background-light p-0 border-bottom">
                                <explanation-editor v-model:source="cell.metadata.explanation" :isActive="activeIndex === index" 
                                                    :index="index" :asRead="asRead" :lastRunIndex="lastRunIndex"
                                                    :start-edit-key="explanationEditKey[index]"
                                @save="(content) => sendExplanationToServer(content, index)" 
                                @gencode="() => generateCode(index)" 
                                @run="() => runCell(index)"
                                @delete="deleteCell(index)"
                                @moveUp="moveCell(index, -1)"
                                @moveDown="moveCell(index, 1)" />
                            </div>
                            <code-cell v-model:source="cell.source" :execution-count="cell.execution_count" @save="(content) => sendCodeToServer(content, index)" />
                            
                            <div v-if="cell.outputs?.length" class="p-2 border-top has-background-white">
                                <output-renderer v-for="(out, oIdx) in cell.outputs" :key="oIdx" :output="out" />
                            </div>
                        </div>
                    </div>

                    <div v-if="activeIndex === index" class="pb-1" style="display:flex; justify-content:center; gap:0.5rem;">
                        <button class="button insert-cell is-success is-small py-0 px-3" @click.stop="insertCell(index + 1, 'markdown')">Insert Comment</button>
                        <button class="button insert-cell is-success is-small py-0 px-3" @click.stop="insertCell(index + 1, 'code')">Insert Action</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" :class="{'is-active': showSettings}">
        <div class="modal-background" @click="closeSettings"></div>
        <div class="modal-card">
            <header class="modal-card-head">
                <p class="modal-card-title">Settings</p>
                <button class="delete" aria-label="close" @click="closeSettings"></button>
            </header>
            <section class="modal-card-body">
                <div class="field">
                    <label class="label">Gemini API Key</label>
                    <div class="control">
                        <input class="input" type="text" v-model="geminiApiKey" placeholder="Enter your Gemini API key">
                    </div>
                    <p class="help">Your API key is stored locally in ~/.settings/nlbook and used for AI-powered features.</p>
                </div>
            </section>
            <footer class="modal-card-foot">
                <button class="button" @click="closeSettings">Close</button>
            </footer>
        </div>
    </div>
    </script>
    
    <footer class="footer">
    </footer>
  </body>
  <!-- Loads the index-specific js for Vue -->
  <script src="js/prism.min.js"></script>
  <script src="js/prism-python.min.js"></script>
  <script src="js/markdown-it.min.js"></script>
  <script type="module" src="js/nb.js"></script>
</html>
